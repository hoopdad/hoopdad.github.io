<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Corporate communication around AI risk and delivery</title>
  <desc id="desc">A polished corporate meeting scene with people communicating around a shared delivery and risk model.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef7fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f2742" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 700 40px "Segoe UI", Arial, sans-serif; fill: #12324a; }
      .label { font: 700 27px "Segoe UI", Arial, sans-serif; fill: #12324a; }
      .small { font: 500 21px "Segoe UI", Arial, sans-serif; fill: #5b7083; }
      .micro { font: 700 17px "Segoe UI", Arial, sans-serif; fill: #2b6cb0; letter-spacing: 0.8px; }
      .panel { fill: #ffffff; stroke: #bfd6eb; stroke-width: 3; }
      .line { stroke: #7aa7d4; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="165" r="250" fill="#dbeafe" opacity="0.55"/>
  <circle cx="250" cy="740" r="240" fill="#cce9ec" opacity="0.45"/>

  <text x="800" y="105" text-anchor="middle" class="micro">COMMUNICATION MAKES THE RISK SURFACE VISIBLE</text>
  <text x="800" y="160" text-anchor="middle" class="title">The right conversations keep fast systems pointed at reality</text>

  <g filter="url(#shadow)">
    <rect x="250" y="240" width="1100" height="420" rx="42" class="panel"/>
  </g>

  <ellipse cx="800" cy="570" rx="420" ry="95" fill="#d8e7f3"/>
  <ellipse cx="800" cy="545" rx="390" ry="76" fill="#ffffff" stroke="#bfd6eb" stroke-width="3"/>

  <g transform="translate(698 348)">
    <rect x="0" y="0" width="204" height="125" rx="24" fill="#eef7fb" stroke="#8fb4d9" stroke-width="3"/>
    <text x="102" y="48" text-anchor="middle" class="label">Risk</text>
    <text x="102" y="82" text-anchor="middle" class="small">signals + controls</text>
  </g>

  <path class="line" d="M 652 462 C 580 430, 535 408, 492 383"/>
  <path class="line" d="M 948 462 C 1020 430, 1065 408, 1108 383"/>
  <path class="line" d="M 690 502 C 612 535, 552 552, 475 560"/>
  <path class="line" d="M 910 502 C 988 535, 1048 552, 1125 560"/>

  <g transform="translate(392 287)">
    <circle cx="74" cy="54" r="38" fill="#12324a"/>
    <path d="M 20 170 C 30 104, 118 104, 128 170 Z" fill="#2b6cb0"/>
    <rect x="145" y="8" width="210" height="84" rx="24" fill="#ffffff" stroke="#bfd6eb" stroke-width="3"/>
    <text x="250" y="44" text-anchor="middle" class="small">What changed?</text>
    <text x="250" y="72" text-anchor="middle" class="small">What is safe?</text>
  </g>

  <g transform="translate(1038 287)">
    <circle cx="190" cy="54" r="38" fill="#12324a"/>
    <path d="M 136 170 C 146 104, 234 104, 244 170 Z" fill="#1a9aa2"/>
    <rect x="-96" y="8" width="210" height="84" rx="24" fill="#ffffff" stroke="#bfd6eb" stroke-width="3"/>
    <text x="9" y="44" text-anchor="middle" class="small">How do we</text>
    <text x="9" y="72" text-anchor="middle" class="small">verify it?</text>
  </g>

  <g transform="translate(315 510)">
    <circle cx="74" cy="54" r="38" fill="#12324a"/>
    <path d="M 20 170 C 30 104, 118 104, 128 170 Z" fill="#1a9aa2"/>
  </g>
  <g transform="translate(1145 510)">
    <circle cx="74" cy="54" r="38" fill="#12324a"/>
    <path d="M 20 170 C 30 104, 118 104, 128 170 Z" fill="#2b6cb0"/>
  </g>

  <g transform="translate(515 690)">
    <rect width="570" height="72" rx="24" fill="#ffffff" stroke="#bfd6eb" stroke-width="2"/>
    <text x="285" y="46" text-anchor="middle" class="small">Clear communication turns vague risk into specific action.</text>
  </g>
</svg>
