<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise team aligning on risk and delivery signals</title>
  <desc id="desc">A restrained enterprise technology illustration showing a corporate team turning risk signals into clear decisions through communication.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eaf4fb"/>
    </linearGradient>
    <linearGradient id="room" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef7fb"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12324a"/>
      <stop offset="1" stop-color="#1f4f78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0f2742" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f2742" flood-opacity="0.11"/>
    </filter>
    <style>
      .headline { font: 700 40px "Segoe UI", Arial, sans-serif; fill: #12324a; }
      .label { font: 700 27px "Segoe UI", Arial, sans-serif; fill: #12324a; }
      .small { font: 500 21px "Segoe UI", Arial, sans-serif; fill: #5b7083; }
      .screenText { font: 600 20px "Segoe UI", Arial, sans-serif; fill: #e8f2ff; }
      .micro { font: 700 17px "Segoe UI", Arial, sans-serif; fill: #2b6cb0; letter-spacing: 0.8px; }
      .line { stroke: #7aa7d4; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .tealLine { stroke: #1a9aa2; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .blueLine { stroke: #2b6cb0; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1280" cy="160" r="260" fill="#dbeafe" opacity="0.55"/>
  <circle cx="275" cy="760" r="250" fill="#cce9ec" opacity="0.48"/>

  <rect x="110" y="96" width="1380" height="690" rx="46" fill="url(#room)" filter="url(#shadow)"/>
  <text x="800" y="150" text-anchor="middle" class="micro">RISK BECOMES MANAGEABLE WHEN IT BECOMES SPECIFIC</text>
  <text x="800" y="206" text-anchor="middle" class="headline">Clear conversations turn fast-moving AI delivery into governed action</text>

  <g filter="url(#softShadow)">
    <rect x="455" y="270" width="690" height="285" rx="34" fill="url(#screen)"/>
    <rect x="490" y="310" width="238" height="44" rx="14" fill="#ffffff" opacity="0.14"/>
    <rect x="490" y="377" width="180" height="28" rx="14" fill="#ffffff" opacity="0.20"/>
    <rect x="490" y="425" width="255" height="28" rx="14" fill="#ffffff" opacity="0.20"/>
    <rect x="490" y="473" width="210" height="28" rx="14" fill="#ffffff" opacity="0.20"/>
    <text x="610" y="340" text-anchor="middle" class="screenText">Risk signals</text>

    <path d="M 820 478 L 880 410 L 940 445 L 1010 348 L 1080 385" class="tealLine"/>
    <circle cx="880" cy="410" r="9" fill="#8de0d8"/>
    <circle cx="1010" cy="348" r="9" fill="#8de0d8"/>
    <circle cx="1080" cy="385" r="9" fill="#8de0d8"/>
    <path d="M 805 330 L 805 505 L 1095 505" stroke="#dbeafe" stroke-width="3" opacity="0.55" fill="none"/>
    <text x="956" y="540" text-anchor="middle" class="screenText">specific control decisions</text>
  </g>

  <g filter="url(#softShadow)">
    <ellipse cx="800" cy="690" rx="480" ry="74" fill="#d0deea"/>
    <ellipse cx="800" cy="662" rx="430" ry="64" fill="#ffffff" stroke="#bfd6eb" stroke-width="3"/>
    <rect x="602" y="628" width="396" height="58" rx="22" fill="#eef7fb" stroke="#c6d8e8" stroke-width="2"/>
    <text x="800" y="665" text-anchor="middle" class="small">shared understanding before shared action</text>
  </g>

  <g transform="translate(260 480)">
    <circle cx="80" cy="50" r="40" fill="#12324a"/>
    <path d="M 24 175 C 36 105, 124 105, 136 175 Z" fill="#2b6cb0"/>
    <rect x="145" y="-15" width="230" height="86" rx="24" fill="#ffffff" stroke="#bfd6eb" stroke-width="3" filter="url(#softShadow)"/>
    <path d="M 146 50 L 125 63 L 145 70 Z" fill="#ffffff" stroke="#bfd6eb" stroke-width="3"/>
    <text x="260" y="20" text-anchor="middle" class="small">What changed?</text>
    <text x="260" y="50" text-anchor="middle" class="small">What evidence</text>
    <text x="260" y="80" text-anchor="middle" class="small">do we have?</text>
  </g>

  <g transform="translate(1122 470)">
    <circle cx="195" cy="50" r="40" fill="#12324a"/>
    <path d="M 139 175 C 151 105, 239 105, 251 175 Z" fill="#1a9aa2"/>
    <rect x="-70" y="-15" width="230" height="86" rx="24" fill="#ffffff" stroke="#bfd6eb" stroke-width="3" filter="url(#softShadow)"/>
    <path d="M 160 50 L 181 63 L 161 70 Z" fill="#ffffff" stroke="#bfd6eb" stroke-width="3"/>
    <text x="45" y="20" text-anchor="middle" class="small">Which control</text>
    <text x="45" y="50" text-anchor="middle" class="small">turns this into</text>
    <text x="45" y="80" text-anchor="middle" class="small">a decision?</text>
  </g>

  <g transform="translate(525 588)">
    <circle cx="70" cy="42" r="34" fill="#12324a"/>
    <path d="M 22 142 C 31 90, 109 90, 118 142 Z" fill="#5c88b5"/>
  </g>
  <g transform="translate(948 588)">
    <circle cx="70" cy="42" r="34" fill="#12324a"/>
    <path d="M 22 142 C 31 90, 109 90, 118 142 Z" fill="#2b6cb0"/>
  </g>

  <path d="M 435 540 C 500 500, 560 470, 635 450" class="line" opacity="0.75"/>
  <path d="M 1165 540 C 1100 500, 1040 470, 965 450" class="line" opacity="0.75"/>
  <path d="M 665 626 C 715 590, 770 570, 800 555" class="blueLine" opacity="0.68"/>
  <path d="M 935 626 C 885 590, 830 570, 800 555" class="tealLine" opacity="0.68"/>
</svg>
