<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Visionary enterprise manager leading without micromanaging</title>
  <desc id="desc">A corporate leader sets direction from a balcony view while teams and agent systems execute within clear guardrails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#edf7fb"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#cce9ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f2742" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 700 40px "Segoe UI", Arial, sans-serif; fill: #12324a; }
      .label { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #12324a; }
      .small { font: 500 21px "Segoe UI", Arial, sans-serif; fill: #5b7083; }
      .micro { font: 700 17px "Segoe UI", Arial, sans-serif; fill: #2b6cb0; letter-spacing: 0.8px; }
      .panel { fill: #ffffff; stroke: #bfd6eb; stroke-width: 3; }
      .line { stroke: #7aa7d4; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="120" y="105" width="1360" height="640" rx="46" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="185" y="165" width="1230" height="360" rx="32" fill="url(#window)" opacity="0.78"/>
  <path d="M 220 485 C 420 375, 560 385, 710 455 C 850 520, 1005 370, 1220 440 C 1300 466, 1360 480, 1410 478 L 1410 525 L 220 525 Z" fill="#ffffff" opacity="0.48"/>
  <path d="M 270 465 L 500 345 L 760 435 L 1010 300 L 1330 395" class="line" stroke-width="6"/>
  <circle cx="500" cy="345" r="10" fill="#2b6cb0"/>
  <circle cx="1010" cy="300" r="10" fill="#1a9aa2"/>
  <path d="M 1010 300 L 1065 312 M 1010 300 L 1027 354" stroke="#1a9aa2" stroke-width="6" stroke-linecap="round"/>

  <text x="800" y="105" text-anchor="middle" class="micro">LEADING THE OPERATING MODEL</text>
  <text x="800" y="795" text-anchor="middle" class="title">Set direction, define guardrails, then let capable systems work</text>

  <g transform="translate(260 435)">
    <circle cx="100" cy="72" r="47" fill="#12324a"/>
    <path d="M 35 245 C 49 152, 151 152, 165 245 Z" fill="#2b6cb0"/>
    <rect x="72" y="115" width="56" height="122" rx="22" fill="#12324a"/>
    <path d="M 125 168 L 290 86" stroke="#12324a" stroke-width="15" stroke-linecap="round"/>
    <path d="M 283 82 L 267 75 M 283 82 L 274 98" stroke="#12324a" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g transform="translate(640 545)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="120" rx="28" class="panel"/>
    <text x="125" y="48" text-anchor="middle" class="label">Vision</text>
    <text x="125" y="83" text-anchor="middle" class="small">clear direction</text>
  </g>
  <g transform="translate(920 545)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="120" rx="28" class="panel"/>
    <text x="125" y="48" text-anchor="middle" class="label">Guardrails</text>
    <text x="125" y="83" text-anchor="middle" class="small">bounded autonomy</text>
  </g>
  <g transform="translate(1200 545)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="120" rx="28" class="panel"/>
    <text x="125" y="48" text-anchor="middle" class="label">Feedback</text>
    <text x="125" y="83" text-anchor="middle" class="small">quality loops</text>
  </g>
</svg>
