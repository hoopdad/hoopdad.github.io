<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Management flow for effective AI assistant work</title>
  <desc id="desc">A clean enterprise flowchart showing communicate, written requirements, review outcomes, and watch for failure loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eaf4fb"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef7fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f2742" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f2742" flood-opacity="0.10"/>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#d8e3ef" stroke-width="1"/>
    </pattern>
    <style>
      .headline { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #12324a; }
      .label { font: 700 31px "Segoe UI", Arial, sans-serif; fill: #12324a; }
      .small { font: 500 21px "Segoe UI", Arial, sans-serif; fill: #5b7083; }
      .micro { font: 700 17px "Segoe UI", Arial, sans-serif; fill: #2b6cb0; letter-spacing: 0.8px; }
      .num { font: 800 23px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .card { fill: url(#card); stroke: #bfd6eb; stroke-width: 3; }
      .arrow { stroke: #2b6cb0; stroke-width: 7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .loop { stroke: #1a9aa2; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 12 12; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.38"/>
  <circle cx="1290" cy="150" r="255" fill="#dbeafe" opacity="0.55"/>
  <circle cx="260" cy="740" r="250" fill="#cce9ec" opacity="0.45"/>

  <rect x="110" y="118" width="1380" height="650" rx="46" fill="#ffffff" filter="url(#shadow)"/>
  <text x="800" y="184" text-anchor="middle" class="micro">THE NEW MANAGEMENT PROBLEM</text>
  <text x="800" y="242" text-anchor="middle" class="headline">Lead AI assistants through a managed operating loop</text>

  <path class="arrow" d="M 410 464 L 505 464"/>
  <path class="arrow" d="M 505 464 L 480 447 M 505 464 L 480 481"/>
  <path class="arrow" d="M 740 464 L 835 464"/>
  <path class="arrow" d="M 835 464 L 810 447 M 835 464 L 810 481"/>
  <path class="arrow" d="M 1070 464 L 1165 464"/>
  <path class="arrow" d="M 1165 464 L 1140 447 M 1165 464 L 1140 481"/>

  <g filter="url(#softShadow)">
    <rect x="180" y="335" width="230" height="258" rx="34" class="card"/>
    <circle cx="295" cy="389" r="28" fill="#2b6cb0"/>
    <text x="295" y="397" text-anchor="middle" class="num">1</text>
    <text x="295" y="459" text-anchor="middle" class="label">Communicate</text>
    <text x="295" y="503" text-anchor="middle" class="small">the user flow,</text>
    <text x="295" y="532" text-anchor="middle" class="small">intent, and</text>
    <text x="295" y="561" text-anchor="middle" class="small">constraints</text>

    <rect x="510" y="335" width="230" height="258" rx="34" class="card"/>
    <circle cx="625" cy="389" r="28" fill="#2b6cb0"/>
    <text x="625" y="397" text-anchor="middle" class="num">2</text>
    <text x="625" y="446" text-anchor="middle" class="label">Written</text>
    <text x="625" y="482" text-anchor="middle" class="label">requirements</text>
    <text x="625" y="526" text-anchor="middle" class="small">make standards</text>
    <text x="625" y="555" text-anchor="middle" class="small">explicit and</text>
    <text x="625" y="584" text-anchor="middle" class="small">reusable</text>

    <rect x="840" y="335" width="230" height="258" rx="34" class="card"/>
    <circle cx="955" cy="389" r="28" fill="#1a9aa2"/>
    <text x="955" y="397" text-anchor="middle" class="num">3</text>
    <text x="955" y="446" text-anchor="middle" class="label">Review</text>
    <text x="955" y="482" text-anchor="middle" class="label">outcomes</text>
    <text x="955" y="526" text-anchor="middle" class="small">compare what</text>
    <text x="955" y="555" text-anchor="middle" class="small">was built to</text>
    <text x="955" y="584" text-anchor="middle" class="small">what was asked</text>

    <rect x="1170" y="335" width="250" height="258" rx="34" class="card"/>
    <circle cx="1295" cy="389" r="28" fill="#1a9aa2"/>
    <text x="1295" y="397" text-anchor="middle" class="num">4</text>
    <text x="1295" y="446" text-anchor="middle" class="label">Watch for</text>
    <text x="1295" y="482" text-anchor="middle" class="label">failure loops</text>
    <text x="1295" y="526" text-anchor="middle" class="small">adapt when</text>
    <text x="1295" y="555" text-anchor="middle" class="small">the assistant</text>
    <text x="1295" y="584" text-anchor="middle" class="small">keeps circling</text>
  </g>

  <path class="loop" d="M 1295 621 C 1165 708, 440 708, 300 621"/>
  <path class="loop" d="M 300 621 L 323 617 M 300 621 L 314 640"/>
  <text x="800" y="694" text-anchor="middle" class="small">When the loop stops improving, change the operating conditions.</text>
</svg>
