<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Executive leader setting direction without micromanaging</title>
  <desc id="desc">A photo-adjacent enterprise editorial illustration of an executive leader framing vision and guardrails while a team works with autonomy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eaf4fb"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafdff"/>
      <stop offset="0.55" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#c7e7ec"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d8e4ef"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="48%" cy="32%" r="58%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="0.65" stop-color="#eef6fb" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#c9dce9" stop-opacity="0.2"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0f2742" flood-opacity="0.16"/>
    </filter>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
    <style>
      .headline { font: 700 40px "Segoe UI", Arial, sans-serif; fill: #12324a; }
      .label { font: 700 26px "Segoe UI", Arial, sans-serif; fill: #12324a; }
      .small { font: 500 20px "Segoe UI", Arial, sans-serif; fill: #5b7083; }
      .micro { font: 700 17px "Segoe UI", Arial, sans-serif; fill: #2b6cb0; letter-spacing: 0.8px; }
      .glassLine { stroke: #ffffff; stroke-width: 3; opacity: 0.62; }
      .blueLine { stroke: #2b6cb0; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .tealLine { stroke: #1a9aa2; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .card { fill: #ffffff; stroke: #c6d8e8; stroke-width: 2.5; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="120" y="78" width="1360" height="720" rx="44" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="158" y="116" width="1284" height="520" rx="30" fill="url(#glass)"/>
  <rect x="158" y="116" width="1284" height="520" rx="30" fill="url(#spotlight)"/>

  <path d="M 158 636 L 1442 636 L 1340 760 L 260 760 Z" fill="url(#floor)"/>
  <path d="M 158 636 L 1442 636" stroke="#b9ccdc" stroke-width="3"/>
  <path d="M 342 116 L 342 636 M 566 116 L 566 636 M 790 116 L 790 636 M 1014 116 L 1014 636 M 1238 116 L 1238 636" class="glassLine"/>

  <text x="800" y="94" text-anchor="middle" class="micro">THE NEW MANAGEMENT PROBLEM</text>

  <g opacity="0.52" filter="url(#soft)">
    <rect x="1010" y="352" width="270" height="122" rx="22" fill="#ffffff" stroke="#9fc2e4" stroke-width="3"/>
    <path d="M 1045 432 L 1098 392 L 1142 416 L 1192 368 L 1244 392" class="tealLine"/>
    <circle cx="1192" cy="368" r="8" fill="#1a9aa2"/>
    <rect x="1010" y="502" width="180" height="20" rx="10" fill="#8fb4d9"/>
    <rect x="1010" y="534" width="230" height="20" rx="10" fill="#c6d8e8"/>
  </g>

  <g opacity="0.62">
    <ellipse cx="430" cy="607" rx="180" ry="48" fill="#b7cad9"/>
    <rect x="270" y="540" width="320" height="58" rx="29" fill="#ffffff" stroke="#c6d8e8" stroke-width="3"/>
    <circle cx="325" cy="486" r="33" fill="#12324a"/>
    <path d="M 278 555 C 288 510, 362 510, 372 555 Z" fill="#2b6cb0"/>
    <circle cx="496" cy="486" r="33" fill="#12324a"/>
    <path d="M 449 555 C 459 510, 533 510, 543 555 Z" fill="#1a9aa2"/>
    <circle cx="410" cy="466" r="35" fill="#12324a"/>
    <path d="M 360 548 C 372 500, 448 500, 460 548 Z" fill="#5c88b5"/>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="760" cy="678" rx="142" ry="38" fill="#9fb8cc" opacity="0.58"/>
    <circle cx="750" cy="355" r="58" fill="#12324a"/>
    <path d="M 670 604 C 682 488, 818 488, 830 604 Z" fill="#1f4f78"/>
    <rect x="704" y="420" width="92" height="178" rx="34" fill="#12324a"/>
    <path d="M 710 430 L 746 508 L 790 430 Z" fill="#ffffff" opacity="0.92"/>
    <path d="M 750 508 L 738 580 L 762 580 Z" fill="#2b6cb0"/>
    <path d="M 800 492 C 905 454, 980 398, 1045 320" class="blueLine"/>
    <path d="M 1045 320 L 1022 318 M 1045 320 L 1037 342" stroke="#2b6cb0" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="948" y="166" width="318" height="130" rx="28" class="card"/>
    <text x="1107" y="217" text-anchor="middle" class="label">Direction</text>
    <text x="1107" y="254" text-anchor="middle" class="small">clear outcomes, not task-by-task control</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="255" y="184" width="242" height="112" rx="26" class="card"/>
    <text x="376" y="229" text-anchor="middle" class="label">Vision</text>
    <text x="376" y="263" text-anchor="middle" class="small">where the work goes</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1080" y="560" width="246" height="112" rx="26" class="card"/>
    <text x="1203" y="605" text-anchor="middle" class="label">Guardrails</text>
    <text x="1203" y="639" text-anchor="middle" class="small">bounded autonomy</text>
  </g>

  <path d="M 497 240 C 610 220, 800 210, 948 228" stroke="#7aa7d4" stroke-width="4" fill="none" stroke-dasharray="9 12" opacity="0.82"/>
  <path d="M 1030 568 C 900 612, 720 610, 590 570" stroke="#1a9aa2" stroke-width="4" fill="none" stroke-dasharray="9 12" opacity="0.72"/>

  <text x="800" y="835" text-anchor="middle" class="headline">Lead the system. Do not micromanage the agents.</text>
</svg>
