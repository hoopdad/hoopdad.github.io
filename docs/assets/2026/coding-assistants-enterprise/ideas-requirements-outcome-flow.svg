<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ideas and requirements flowing to enterprise outcomes</title>
  <desc id="desc">A clean enterprise flow showing ideas and requirements entering an AI-assisted delivery system and producing outcomes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef7fb"/>
    </linearGradient>
    <linearGradient id="system" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6f3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#0f2742" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #12324a; }
      .label { font: 700 31px "Segoe UI", Arial, sans-serif; fill: #12324a; }
      .small { font: 500 23px "Segoe UI", Arial, sans-serif; fill: #5b7083; }
      .micro { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #2b6cb0; letter-spacing: 0.8px; }
      .card { fill: #ffffff; stroke: #bfd6eb; stroke-width: 3; }
      .line { stroke: #2b6cb0; stroke-width: 7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .teal { stroke: #1a9aa2; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M 90 720 C 430 590, 1030 590, 1510 725" fill="none" stroke="#d7e7f3" stroke-width="90" opacity="0.55"/>
  <circle cx="1320" cy="170" r="230" fill="#dbeafe" opacity="0.55"/>
  <circle cx="240" cy="710" r="220" fill="#cce9ec" opacity="0.45"/>

  <text x="800" y="100" text-anchor="middle" class="micro">FROM INTENT TO IMPLEMENTATION</text>
  <text x="800" y="155" text-anchor="middle" class="title">Clear inputs make better enterprise outcomes</text>

  <g filter="url(#shadow)">
    <rect x="130" y="285" width="315" height="260" rx="34" class="card"/>
    <rect x="1155" y="285" width="315" height="260" rx="34" class="card"/>
    <rect x="560" y="230" width="480" height="370" rx="46" fill="url(#system)" stroke="#8fb4d9" stroke-width="3"/>
  </g>

  <text x="288" y="355" text-anchor="middle" class="label">Ideas</text>
  <text x="288" y="398" text-anchor="middle" class="small">user flow</text>
  <text x="288" y="430" text-anchor="middle" class="small">business intent</text>
  <text x="288" y="462" text-anchor="middle" class="small">decision context</text>
  <path d="M 204 492 C 242 470, 334 470, 372 492" fill="none" stroke="#1a9aa2" stroke-width="5" stroke-linecap="round"/>

  <text x="800" y="315" text-anchor="middle" class="label">AI-assisted</text>
  <text x="800" y="355" text-anchor="middle" class="label">delivery system</text>
  <rect x="650" y="405" width="300" height="54" rx="16" fill="#ffffff" stroke="#bfd6eb" stroke-width="2"/>
  <text x="800" y="441" text-anchor="middle" class="small">requirements + standards</text>
  <rect x="650" y="478" width="300" height="54" rx="16" fill="#ffffff" stroke="#bfd6eb" stroke-width="2"/>
  <text x="800" y="514" text-anchor="middle" class="small">tools + review loops</text>

  <text x="1313" y="355" text-anchor="middle" class="label">Outcome</text>
  <text x="1313" y="398" text-anchor="middle" class="small">working software</text>
  <text x="1313" y="430" text-anchor="middle" class="small">repeatable delivery</text>
  <text x="1313" y="462" text-anchor="middle" class="small">auditable change</text>
  <path d="M 1234 500 L 1392 500" stroke="#1a9aa2" stroke-width="5" stroke-linecap="round"/>
  <path d="M 1392 500 L 1374 487 M 1392 500 L 1374 513" stroke="#1a9aa2" stroke-width="5" stroke-linecap="round"/>

  <path class="line" d="M 445 415 L 540 415"/>
  <path class="line" d="M 540 415 L 516 399 M 540 415 L 516 431"/>
  <path class="line teal" d="M 1040 415 L 1135 415"/>
  <path class="line teal" d="M 1135 415 L 1111 399 M 1135 415 L 1111 431"/>

  <g transform="translate(140 625)">
    <rect x="0" y="0" width="1320" height="92" rx="28" fill="#ffffff" opacity="0.82" stroke="#d7e7f3" stroke-width="2"/>
    <text x="660" y="57" text-anchor="middle" class="small">The clearer the intent, requirements, and guardrails, the closer the implementation lands to the target.</text>
  </g>
</svg>
